# ============================================================
# yt-search.yml — Bale YouTube Search Engine V8 (Final)
# Repository: github.com/khashayardev/youtube-downloader-template
# ============================================================
# قابلیت‌های جدید V8:
#   ۱. فیلتر مدت ویدیو (Short/Medium/Long/Any)
#   ۲. دکمه دانلود فقط صدا کنار دانلود ویدیو
#   ۳. فیلتر تاریخ آپلود (Today/Week/Month/Year/Any)
#   ۴. فیلتر لایو استریم (Yes/No)
#   ۵. دکمه ارسال به دوست (Share)
#   ۶. جستجوی playlist (با toggle در inputs)
# ============================================================

name: "🔍 YouTube Search"

on:
  workflow_dispatch:
    inputs:
      query:
        description: "عبارت جستجو"
        required: true
        type: string
      chat_id:
        description: "شناسه کاربر"
        required: true
        type: string
      max_results:
        description: "تعداد نتایج در هر صفحه (۱ تا ۱۰)"
        required: false
        type: string
        default: "5"
      page:
        description: "شماره صفحه (۱ تا ۵)"
        required: false
        type: string
        default: "1"
      sort_by:
        description: "مرتب‌سازی نتایج"
        required: false
        type: choice
        default: "relevance"
        options:
          - relevance
          - date
          - views
          - rating
      duration_filter:
        description: "فیلتر مدت ویدیو"
        required: false
        type: choice
        default: "any"
        options:
          - any
          - short
          - medium
          - long
      date_filter:
        description: "فیلتر تاریخ آپلود"
        required: false
        type: choice
        default: "any"
        options:
          - any
          - today
          - week
          - month
          - year
      live_filter:
        description: "فقط لایوهای در حال پخش"
        required: false
        type: boolean
        default: false
      search_type:
        description: "نوع جستجو"
        required: false
        type: choice
        default: "video"
        options:
          - video
          - playlist

jobs:
  search:
    name: "🔎 Search & Display"
    runs-on: ubuntu-latest
    container:
      image: khashayardev/bale-yt-downloader:latest
    timeout-minutes: 5

    steps:
      - name: "📦 Verify Dependencies"
        run: |
          echo "✅ Pre-installed in Docker image"
          yt-dlp --version
          jq --version

      - name: "🔍 Search & Send Results"
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: |
          #!/bin/bash
          set +e
          
          QUERY="${{ github.event.inputs.query }}"
          CHAT_ID="${{ github.event.inputs.chat_id }}"
          MAX_RESULTS="${{ github.event.inputs.max_results }}"
          PAGE="${{ github.event.inputs.page }}"
          SORT_BY="${{ github.event.inputs.sort_by }}"
          DURATION_FILTER="${{ github.event.inputs.duration_filter }}"
          DATE_FILTER="${{ github.event.inputs.date_filter }}"
          LIVE_FILTER="${{ github.event.inputs.live_filter }}"
          SEARCH_TYPE="${{ github.event.inputs.search_type }}"
          BOT_TOKEN="${{ secrets.BALE_BOT_TOKEN }}"
          
          # ═══════════════════════════════════════════════
          # Helper Functions
          # ═══════════════════════════════════════════════
          
          send_message() {
            local text="$1"
            local reply_markup="${2:-}"
            
            if [ -n "$reply_markup" ]; then
              jq -n \
                --arg chat_id "$CHAT_ID" \
                --arg text "$text" \
                --argjson reply_markup "$reply_markup" \
                '{chat_id: $chat_id, text: $text, parse_mode: "Markdown", reply_markup: $reply_markup}' \
                > /tmp/payload.json
            else
              jq -n \
                --arg chat_id "$CHAT_ID" \
                --arg text "$text" \
                '{chat_id: $chat_id, text: $text, parse_mode: "Markdown"}' \
                > /tmp/payload.json
            fi
            
            curl -s -X POST "https://tapi.bale.ai/bot${BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d @/tmp/payload.json > /dev/null 2>&1
          }
          
          format_number() {
            local num=$1
            if [ -z "$num" ] || [ "$num" = "null" ] || [ "$num" = "0" ] || [ "$num" -eq 0 ] 2>/dev/null; then
              echo ""
              return
            fi
            
            if [ "$num" -gt 1000000000 ] 2>/dev/null; then
              local val=$(echo "scale=1; $num / 1000000000" | bc 2>/dev/null)
              echo "${val} میلیارد"
            elif [ "$num" -gt 1000000 ] 2>/dev/null; then
              local val=$(echo "scale=1; $num / 1000000" | bc 2>/dev/null)
              echo "${val} میلیون"
            elif [ "$num" -gt 1000 ] 2>/dev/null; then
              local val=$(echo "scale=1; $num / 1000" | bc 2>/dev/null)
              echo "${val} هزار"
            else
              echo "${num}"
            fi
          }
          
          format_duration() {
            local sec=$1
            if [ -z "$sec" ] || [ "$sec" = "null" ] || [ "$sec" -le 0 ] 2>/dev/null; then
              echo ""
              return
            fi
            local h=$((sec / 3600))
            local m=$(((sec % 3600) / 60))
            local s=$((sec % 60))
            if [ "$h" -gt 0 ]; then
              printf "%d:%02d:%02d" $h $m $s
            else
              printf "%d:%02d" $m $s
            fi
          }
          
          RESULTS_FILE="/tmp/search_results.json"
          
          # ═══════════════════════════════════════════════
          # Build yt-dlp command flags
          # ═══════════════════════════════════════════════
          
          # ۱. مرتب‌سازی
          case "${SORT_BY}" in
            date)   SORT_FLAG="--date today" ;;
            views)  SORT_FLAG="--format-sort view_count" ;;
            rating) SORT_FLAG="--format-sort like_count" ;;
            *)      SORT_FLAG="" ;;
          esac
          
          # ۲. فیلتر مدت ویدیو (قابلیت ۱)
          DURATION_FLAG=""
          case "${DURATION_FILTER}" in
            short)  DURATION_FLAG='--match-filter duration < 240' ;;
            medium) DURATION_FLAG='--match-filter "duration >= 240 & duration < 1200"' ;;
            long)   DURATION_FLAG='--match-filter duration >= 1200' ;;
            *)      DURATION_FLAG="" ;;
          esac
          
          # ۳. فیلتر تاریخ آپلود (قابلیت ۳)
          DATE_FLAG=""
          case "${DATE_FILTER}" in
            today) DATE_FLAG="--date today" ;;
            week)  DATE_FLAG="--date thisweek" ;;
            month) DATE_FLAG="--date thismonth" ;;
            year)  DATE_FLAG="--date thisyear" ;;
            *)     DATE_FLAG="" ;;
          esac
          
          # ۴. فیلتر لایو (قابلیت ۴)
          LIVE_FLAG=""
          if [ "$LIVE_FILTER" = "true" ]; then
            LIVE_FLAG='--match-filter is_live'
          fi
          
          # ۵. نوع جستجو: video یا playlist (قابلیت ۶)
          if [ "$SEARCH_TYPE" = "playlist" ]; then
            SEARCH_PREFIX="ytsearchplaylist"
            TYPE_LABEL="پلی‌لیست"
          else
            SEARCH_PREFIX="ytsearch"
            TYPE_LABEL="ویدیو"
          fi
          
          # ═══════════════════════════════════════════════
          # Execute Search with Pagination
          # ═══════════════════════════════════════════════
          
          PAGE="${PAGE:-1}"
          MAX_RESULTS="${MAX_RESULTS:-5}"
          
          if [ "$PAGE" -gt 1 ] 2>/dev/null; then
            TOTAL_TO_FETCH=$((PAGE * MAX_RESULTS))
            yt-dlp \
              ${SORT_FLAG} \
              ${DURATION_FLAG} \
              ${DATE_FLAG} \
              ${LIVE_FLAG} \
              "${SEARCH_PREFIX}${TOTAL_TO_FETCH}:${QUERY}" \
              --dump-json \
              --no-playlist \
              --no-check-certificates \
              --skip-download \
              --flat-playlist \
              2>/dev/null > /tmp/all_results.json || true
            
            START_LINE=$(( (PAGE - 1) * MAX_RESULTS + 1 ))
            END_LINE=$(( START_LINE + MAX_RESULTS - 1 ))
            sed -n "${START_LINE},${END_LINE}p" /tmp/all_results.json > "$RESULTS_FILE"
          else
            yt-dlp \
              ${SORT_FLAG} \
              ${DURATION_FLAG} \
              ${DATE_FLAG} \
              ${LIVE_FLAG} \
              "${SEARCH_PREFIX}${MAX_RESULTS}:${QUERY}" \
              --dump-json \
              --no-playlist \
              --no-check-certificates \
              --skip-download \
              --flat-playlist \
              2>/dev/null > "$RESULTS_FILE" || true
          fi
          
          RESULT_COUNT=$(wc -l < "$RESULTS_FILE" 2>/dev/null || echo 0)
          
          if [ "$RESULT_COUNT" -eq 0 ]; then
            send_message "❌ *نتیجه‌ای یافت نشد!*

          برای عبارت: \`${QUERY}\`
          هیچ ${TYPE_LABEL}ای پیدا نکردم.

          💡 _لطفاً عبارت دیگری را امتحان کنید یا فیلترها را تغییر دهید._"
            exit 0
          fi
          
          echo "✅ Found $RESULT_COUNT results (type: ${SEARCH_TYPE})."
          
          # ═══════════════════════════════════════════════
          # Send Header Message
          # ═══════════════════════════════════════════════
          
          HEADER="🔍 *نتایج جستجو برای:* \`${QUERY}\`
          ▫️ *صفحه:* ${PAGE} | *نوع:* ${TYPE_LABEL}
          ▫️ *تعداد نتایج:* ${RESULT_COUNT} ${TYPE_LABEL}"
          
          [ "$DURATION_FILTER" != "any" ] && HEADER="${HEADER}\n▫️ *مدت:* ${DURATION_FILTER}"
          [ "$DATE_FILTER" != "any" ] && HEADER="${HEADER}\n▫️ *بازه:* ${DATE_FILTER}"
          [ "$LIVE_FILTER" = "true" ] && HEADER="${HEADER}\n▫️ *فقط لایو 🔴*"
          [ "$SORT_BY" != "relevance" ] && HEADER="${HEADER}\n▫️ *مرتب‌سازی:* ${SORT_BY}"
          
          send_message "$HEADER"
          
          # ═══════════════════════════════════════════════
          # Send Each Result with Thumbnail
          # ═══════════════════════════════════════════════
          
          LINE_NUM=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            LINE_NUM=$((LINE_NUM + 1))
            
            TITLE=$(echo "$line" | jq -r '.title // "بدون عنوان"')
            VIDEO_ID=$(echo "$line" | jq -r '.id // .display_id // ""')
            VIDEO_URL="https://www.youtube.com/watch?v=${VIDEO_ID}"
            CHANNEL=$(echo "$line" | jq -r '.channel // .uploader // "نامشخص"')
            VIEW_COUNT=$(echo "$line" | jq -r '.view_count // 0')
            DURATION=$(echo "$line" | jq -r '.duration // 0')
            THUMBNAIL=$(echo "$line" | jq -r '.thumbnail // ""')
            
            # For playlists, extract extra info
            if [ "$SEARCH_TYPE" = "playlist" ]; then
              PLAYLIST_COUNT=$(echo "$line" | jq -r '.playlist_count // ""')
              [ -n "$PLAYLIST_COUNT" ] && [ "$PLAYLIST_COUNT" != "null" ] && \
                PLAYLIST_INFO="📋 *تعداد ویدیوها:* ${PLAYLIST_COUNT}" || \
                PLAYLIST_INFO=""
            else
              PLAYLIST_INFO=""
            fi
            
            VIEW_COUNT_FORMATTED=$(format_number $VIEW_COUNT)
            DURATION_FORMATTED=$(format_duration $DURATION)
            
            # ── Build Caption ──
            CAPTION="🎬 *${TITLE}*
          
          👤 *کانال:* ${CHANNEL}"
            
            [ -n "$DURATION_FORMATTED" ] && CAPTION="${CAPTION}
          ⏱ *مدت:* ${DURATION_FORMATTED}"
            
            [ -n "$VIEW_COUNT_FORMATTED" ] && CAPTION="${CAPTION}
          👁 *بازدید:* ${VIEW_COUNT_FORMATTED}"
            
            [ -n "$PLAYLIST_INFO" ] && CAPTION="${CAPTION}
          ${PLAYLIST_INFO}"
            
            CAPTION="${CAPTION}
          
          🔗 [مشاهده در یوتیوب](${VIDEO_URL})"
            
            # ── Build Keyboard (قابلیت ۲ و ۵) ──
            # Three buttons: Download Video, Download Audio, Share
            
            BTN_DL="dl_${VIDEO_ID}"
            BTN_DLA="dla_${VIDEO_ID}"
            BTN_SHARE="share_${VIDEO_ID}"
            
            if [ "$SEARCH_TYPE" = "playlist" ]; then
              # For playlists: just show playlist button + share
              KEYBOARD=$(jq -n \
                --arg dl_data "dl_${VIDEO_ID}" \
                --arg share_data "share_${VIDEO_ID}" \
                '{inline_keyboard: [
                  [{"text": "📋 مشاهده پلی‌لیست", "callback_data": $dl_data}],
                  [{"text": "📤 ارسال به دوست", "callback_data": $share_data}]
                ]}')
            else
              # For videos: three buttons in two rows
              KEYBOARD=$(jq -n \
                --arg dl_data "$BTN_DL" \
                --arg dla_data "$BTN_DLA" \
                --arg share_data "$BTN_SHARE" \
                '{inline_keyboard: [
                  [
                    {"text": "📥 دانلود ویدیو", "callback_data": $dl_data},
                    {"text": "🎵 فقط صدا", "callback_data": $dla_data}
                  ],
                  [
                    {"text": "📤 ارسال به دوست", "callback_data": $share_data}
                  ]
                ]}')
            fi
            
            # ── Send with Thumbnail (or fallback to text) ──
            if [ -n "$THUMBNAIL" ] && [ "$THUMBNAIL" != "null" ]; then
              jq -n \
                --arg chat_id "$CHAT_ID" \
                --arg photo "$THUMBNAIL" \
                --arg caption "$CAPTION" \
                --argjson reply_markup "$KEYBOARD" \
                '{chat_id: $chat_id, photo: $photo, caption: $caption, parse_mode: "Markdown", reply_markup: $reply_markup}' \
                > /tmp/photo_payload.json
              
              PHOTO_RESPONSE=$(curl -s -X POST "https://tapi.bale.ai/bot${BOT_TOKEN}/sendPhoto" \
                -H "Content-Type: application/json" \
                -d @/tmp/photo_payload.json)
              
              if ! echo "$PHOTO_RESPONSE" | jq -e '.ok == true' > /dev/null 2>&1; then
                echo "  ⚠️ sendPhoto failed, falling back to text"
                send_message "$CAPTION" "$KEYBOARD"
              fi
            else
              send_message "$CAPTION" "$KEYBOARD"
            fi
            
            sleep 0.5
            
          done < "$RESULTS_FILE"
          
          # ═══════════════════════════════════════════════
          # Pagination Buttons
          # ═══════════════════════════════════════════════
          
          Q_SHORT=$(echo "$QUERY" | cut -c1-15 | sed 's/ /_/g')
          
          # Include all filter params in callback data for page navigation
          CB_SUFFIX="${Q_SHORT}_${MAX_RESULTS}_${SORT_BY}_${DURATION_FILTER}_${DATE_FILTER}_${LIVE_FILTER}_${SEARCH_TYPE}"
          
          if [ "$PAGE" -gt 1 ] 2>/dev/null && [ "$RESULT_COUNT" -ge "$MAX_RESULTS" ] 2>/dev/null; then
            PREV_PAGE=$((PAGE - 1))
            NEXT_PAGE=$((PAGE + 1))
            NAV_KEYBOARD=$(jq -n \
              --arg prev_data "sp_${PREV_PAGE}_${CB_SUFFIX}" \
              --arg next_data "sp_${NEXT_PAGE}_${CB_SUFFIX}" \
              '{inline_keyboard: [[
                {"text": "→ قبلی", "callback_data": $prev_data},
                {"text": "بعدی ←", "callback_data": $next_data}
              ]]}')
          elif [ "$PAGE" -gt 1 ] 2>/dev/null; then
            PREV_PAGE=$((PAGE - 1))
            NAV_KEYBOARD=$(jq -n \
              --arg prev_data "sp_${PREV_PAGE}_${CB_SUFFIX}" \
              '{inline_keyboard: [[
                {"text": "→ قبلی", "callback_data": $prev_data}
              ]]}')
          elif [ "$RESULT_COUNT" -ge "$MAX_RESULTS" ] 2>/dev/null; then
            NEXT_PAGE=$((PAGE + 1))
            NAV_KEYBOARD=$(jq -n \
              --arg next_data "sp_${NEXT_PAGE}_${CB_SUFFIX}" \
              '{inline_keyboard: [[
                {"text": "بعدی ←", "callback_data": $next_data}
              ]]}')
          else
            NAV_KEYBOARD='{"inline_keyboard": []}'
          fi
          
          send_message "📄 *صفحه ${PAGE}* — برای مشاهده نتایج بیشتر از دکمه‌ها استفاده کنید." "$NAV_KEYBOARD"
          
          echo "✅ Search complete. ${RESULT_COUNT} results sent."
